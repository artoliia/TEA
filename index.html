
<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Артолія — Головна</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=MedievalSharp&display=swap');
  :root { --crimson: #8B0000; --gold: #FFD700; --white: #F5F0E8; --dark: #0A0505; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--white); font-family: 'Press Start 2P', monospace; line-height: 1.6; }
  nav { position: fixed; top: 0; width: 100%; height: 70px; background: rgba(10,5,5,0.9); border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; z-index: 1000; }
  .logo { color: var(--gold); font-size: 14px; text-shadow: 2px 2px var(--crimson); }
  .nav-links { display: flex; list-style: none; gap: 20px; }
  .nav-links a { color: var(--white); text-decoration: none; font-size: 8px; transition: 0.3s; }
  .nav-links a:hover { color: var(--gold); }
  .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #2a0a0a 0%, #0a0505 100%); }
  .hero h1 { font-size: 40px; color: var(--gold); text-shadow: 5px 5px var(--crimson); margin-bottom: 20px; }
  .btn { padding: 15px 30px; background: var(--crimson); border: 4px solid var(--gold); color: var(--gold); text-decoration: none; font-size: 10px; cursor: pointer; }
  .btn:hover { background: var(--gold); color: var(--crimson); }
</style>
</head>
<body>
  <nav>
    <div class="logo">АРТОЛІЯ</div>
    <ul class="nav-links">

      <li><a href="laws.html">ЗАКОНИ</a></li>
      <li><a href="news.html">НОВИНИ</a></li>
    </ul>
  </nav>
  <div class="hero">
    <h1>ІМПЕРІЯ АРТОЛІЯ</h1>
    <p style="font-size: 10px; margin-bottom: 30px;">Тут гартується сталь та створюється історія</p>
    <a href="wiki.html" class="btn">ДОСЛІДИТИ АРХІВИ</a>
  </div>
</body>
</html>
